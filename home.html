<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>E·WAN</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background-color: #f6f1e8;
      color: #6f5c45;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background-image: url('bg-mobile.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
    }

    .overlay {
      background: rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
      max-width: 420px;
    }

    h1 {
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 18px;
      line-height: 1.4;
      color: #7a674f;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      color: #7d6b56;
      margin-bottom: 34px;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 14px;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .primary {
      background-color: #c7ab84;
      color: white;
    }

    .secondary {
      background-color: rgba(255,255,255,0.7);
      color: #7a674f;
      border: 1px solid rgba(122,103,79,0.15);
    }

    .quick-daily {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      text-decoration: none;
      background-color: rgba(199, 171, 132, 0.92);
      color: white;
      padding: 13px 16px;
      border-radius: 999px;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(80, 60, 40, 0.16);
      backdrop-filter: blur(3px);
    }

    .btn:hover,
    .quick-daily:hover {
      transform: translateY(-1px);
    }

    @media (min-width: 768px) {
      .overlay {
        max-width: 520px;
        padding: 40px;
      }

      h1 {
        font-size: 42px;
      }

      p {
        font-size: 18px;
      }

      .btn {
        font-size: 17px;
      }

      .quick-daily {
        right: 32px;
        bottom: 32px;
        font-size: 15px;
        padding: 14px 18px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <div class="overlay">

      <h1>생각에서 감각으로</h1>

      <p>
        신체감각기반 마음챙김 데이터를 통해<br>
        몸의 변화를 천천히 관찰해보세요.
      </p>

      <a href="baseline.html" class="btn primary">
        감각 기록 시작하기
      </a>

      <a href="#" class="btn secondary">
        나의 리포트 보기
      </a>

    </div>

  </section>

  <a href="daily.html" class="quick-daily">
    오늘의 기록
  </a>

</body>
</html>
